<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taimoor Sohail</title>
<meta name="description" content="Taimoor Sohail. creative portfolio.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   DESKTOP OS PORTFOLIO
   Wallpaper : blurred looping video (media/wallpaper.mp4)
               → falls back to media/hero.jpg → gradient
   Icons     : projects (PROJECTS array below) — draggable with
               momentum physics; click (no drag) opens window
   Dock      : Ae Ps Ai ⚠ | Notes Photos | Instagram Mail | Trash
   ============================================================ */
:root{
  --ink:#1d1d1f;
  --win-bg:rgba(246,246,244,.96);
  --win-line:rgba(0,0,0,.12);
  --label:#fff;
  --font:"Inter",-apple-system,system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  font-family:var(--font);color:var(--ink);
  -webkit-font-smoothing:antialiased;
  background:#8e8a86;
  user-select:none;
}

/* ---------------- WALLPAPER ---------------- */
/* Gradient blur, like the original reference:
   clear up top (you can tell who it is), progressively blurred lower down.
   Two stacked copies of the same image — sharp base + blurred layer whose
   visibility is controlled by a vertical mask. */
.wallpaper{
  position:fixed;inset:0;z-index:0;overflow:hidden;
  background:linear-gradient(160deg,#b9b4ae,#8e8a86 50%,#6e6a66); /* fallback */
  animation:wallFade 1s ease both;
}
@keyframes wallFade{from{opacity:0}}
.wp-sharp,.wp-blur{
  position:absolute;inset:-1%;
  background:url("media/hero.jpg") center/cover no-repeat;
}
.wp-sharp{filter:blur(2.5px) brightness(.99)}          /* nearly clear */
.wp-blur{
  filter:blur(24px) brightness(.97) saturate(1.05);    /* heavy blur below */
  -webkit-mask-image:linear-gradient(to bottom,transparent 8%,rgba(0,0,0,.55) 42%,#000 72%);
          mask-image:linear-gradient(to bottom,transparent 8%,rgba(0,0,0,.55) 42%,#000 72%);
}
.wallpaper video{
  position:absolute;left:50%;top:50%;
  min-width:112%;min-height:112%;width:auto;height:auto;
  transform:translate(-50%,-50%);
  object-fit:cover;
  filter:blur(24px) brightness(.96) saturate(1.05);
}

/* ---------------- LOCK SCREEN (macOS login) ----------------
   The desktop stays frozen until the password is entered. */
.lock{
  position:fixed;inset:0;z-index:1000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  transition:opacity .7s ease;
}
.lock.open{opacity:0;pointer-events:none}
.lock .avatar{
  width:88px;height:88px;border-radius:50%;
  background:#141416;color:#f2efe9;
  display:flex;align-items:center;justify-content:center;
  font-size:26px;font-weight:700;letter-spacing:.04em;
  box-shadow:0 10px 30px rgba(0,0,0,.3);
}
.lock .who{font-size:15px;font-weight:600;color:rgba(0,0,0,.8);text-shadow:0 1px 8px rgba(255,255,255,.4)}
.lock input{
  width:200px;padding:9px 16px;border-radius:99px;border:0;outline:0;
  background:rgba(255,255,255,.55);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  font-family:var(--font);font-size:13px;text-align:center;
  color:#1d1d1f;
  box-shadow:0 4px 18px rgba(0,0,0,.15);
}
.lock input::placeholder{color:rgba(0,0,0,.4)}
.lock .hint{font-size:11.5px;color:rgba(0,0,0,.45)}
.lock input.wrong{animation:wrongShake .4s}
@keyframes wrongShake{
  20%{transform:translateX(-9px)}40%{transform:translateX(9px)}
  60%{transform:translateX(-6px)}80%{transform:translateX(6px)}
}
/* freeze the desktop while locked */
body.locked .icon,body.locked .dock{animation-play-state:paused}

/* ---------------- SIGNATURE (the real signing, replayed on boot) ----------------
   media/signature.mp4 = your iPad recording, cropped + keyed to white.
   mix-blend-mode:multiply makes the white vanish over the wallpaper,
   so only the ink shows — being written exactly as you wrote it. */
.signature{
  position:fixed;left:50%;top:50%;
  transform:translate(-50%,-52%);
  width:min(44vw,520px);z-index:2;pointer-events:none;
  mix-blend-mode:multiply;
  opacity:.92;
  transition:opacity .9s ease, transform .9s ease;
}
.signature.done{opacity:0;transform:translate(-50%,-56%)} /* lifts away */

/* ---------------- DESKTOP ICONS ---------------- */
.icon{
  position:absolute;z-index:5;
  width:92px;text-align:center;cursor:grab;
  touch-action:none;
  opacity:0;transform:scale(.6);
  animation:pop .55s cubic-bezier(.34,1.56,.64,1) forwards;
  animation-delay:calc(var(--i)*70ms + var(--boot-delay, .5s));
}
.icon.settled{opacity:1;transform:none;animation:none}
@keyframes pop{to{opacity:1;transform:scale(1)}}
/* solid square tiles, like the reference — flat, no rounding, no border.
   hover = pop + highlight */
.icon .thumb{
  width:62px;height:62px;margin:0 auto;border-radius:0;
  background:#141416;
  box-shadow:0 3px 10px rgba(0,0,0,.25);
  overflow:hidden;display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.45);font-size:11px;font-weight:700;
  transition:transform .22s cubic-bezier(.34,1.56,.64,1),
             box-shadow .22s, filter .22s;
}
.icon .thumb img,.icon .thumb video{width:100%;height:100%;object-fit:cover;pointer-events:none}
.icon:hover .thumb{
  transform:scale(1.18);
  filter:brightness(1.2);
  box-shadow:0 12px 30px rgba(0,0,0,.4);
}
.icon:hover .label{color:#fff;text-shadow:0 1px 10px rgba(0,0,0,.7)}
.icon.dragging{cursor:grabbing;z-index:60}
.icon.dragging .thumb{
  transform:scale(1.26) rotate(-2deg);
  filter:brightness(1.15);
  box-shadow:0 18px 44px rgba(0,0,0,.45);
}
.icon .label{
  margin-top:7px;font-size:11.5px;font-weight:600;line-height:1.25;
  color:var(--label);letter-spacing:.04em;text-transform:uppercase;
  text-shadow:0 1px 6px rgba(0,0,0,.55);
  pointer-events:none;
}

/* ---------------- WINDOWS ---------------- */
.app-window{
  position:absolute;z-index:100;
  width:min(560px,92vw);max-height:min(72vh,720px);
  display:flex;flex-direction:column;
  background:var(--win-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--win-line);border-radius:12px;
  box-shadow:0 30px 80px rgba(0,0,0,.4);
  overflow:hidden;
  animation:winIn .35s cubic-bezier(.22,1,.36,1);
}
@keyframes winIn{from{opacity:0;transform:scale(.92) translateY(14px)}}
.app-window.closing{animation:winOut .22s ease forwards}
@keyframes winOut{to{opacity:0;transform:scale(.94) translateY(8px)}}

.titlebar{
  display:flex;align-items:center;gap:10px;
  padding:11px 14px;border-bottom:1px solid var(--win-line);
  cursor:grab;flex-shrink:0;
  font-size:12.5px;font-weight:600;color:rgba(0,0,0,.6);
}
.titlebar:active{cursor:grabbing}
.lights{display:flex;gap:7px}
.lights span{width:12px;height:12px;border-radius:50%;display:block;cursor:pointer}
.lights .r{background:#ff5f57}.lights .y{background:#febc2e}.lights .g{background:#28c840}

.win-body{overflow-y:auto;padding:20px 22px 26px;user-select:text}
.win-head{display:flex;gap:14px;align-items:center;margin-bottom:16px}
.win-head .mini{
  width:52px;height:52px;border-radius:0;overflow:hidden;flex-shrink:0;
  background:#141416;
}
.win-head .mini img{width:100%;height:100%;object-fit:cover}
.win-head h2{font-size:16px;font-weight:700}
.win-head .client{font-size:13px;color:rgba(0,0,0,.55)}
.win-body p{font-size:13.5px;line-height:1.65;color:rgba(0,0,0,.78);margin-bottom:10px}
.win-sec{
  margin-top:16px;font-size:12px;font-weight:700;
  color:rgba(0,0,0,.5);margin-bottom:8px;
}
.win-body .detail{font-size:13px;color:rgba(0,0,0,.75)}
.media-stack{display:flex;flex-direction:column;gap:14px;margin-top:6px}
.media-stack video,.media-stack img{width:100%;border-radius:8px;display:block;background:#000}
.media-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px}
.media-grid video,.media-grid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:6px;display:block;background:#000}
.media-note{
  font-size:12.5px;color:rgba(0,0,0,.45);border:1px dashed rgba(0,0,0,.2);
  border-radius:8px;padding:18px;text-align:center;
}
/* redacted content: blurred out with a stamp over it */
.redacted{position:relative}
.redacted .blurred{filter:blur(7px);pointer-events:none;user-select:none}
.redacted .stamp{
  position:sticky;top:120px;z-index:2;height:0;
  display:flex;align-items:center;justify-content:center;
  text-align:center;
  font-weight:800;font-size:clamp(30px,5vw,46px);line-height:1.05;
  letter-spacing:-.02em;color:rgba(16,16,16,.9);
  transform:rotate(-7deg);
  text-transform:lowercase;
  flex-direction:column;gap:6px;
}
.redacted .stamp .sub{
  font-size:14px;font-weight:600;letter-spacing:.02em;
  color:rgba(16,16,16,.65);
}
.paper h3{font-size:13px;font-weight:700;color:rgba(0,0,0,.85);margin:18px 0 8px}
.paper h3:first-child{margin-top:0}
.paper p{font-size:13.5px;line-height:1.65;color:rgba(0,0,0,.78);margin-bottom:10px}
.paper .check{margin-top:4px}
.poem{margin-bottom:30px;max-width:52ch}
.poem h4{font-size:13px;font-weight:700;color:rgba(0,0,0,.85);margin-bottom:10px}
.poem div{white-space:pre-line;font-size:13.5px;line-height:1.75;color:rgba(0,0,0,.78)}

/* ---------------- DOCK ---------------- */
.dock{
  position:fixed;left:50%;bottom:38px;transform:translateX(-50%);z-index:400;
  display:flex;align-items:center;gap:9px;
  padding:8px 12px;border-radius:22px;
  background:rgba(235,235,235,.45);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,.35);
  box-shadow:0 12px 40px rgba(0,0,0,.22);
  opacity:0;
  animation:dockIn .8s cubic-bezier(.22,1,.36,1) forwards;
  animation-delay:calc(var(--boot-delay, .5s) + .7s);
}
@keyframes dockIn{from{transform:translateX(-50%) translateY(70px)}to{opacity:1;transform:translateX(-50%)}}
.dock .sep{width:1px;height:36px;background:rgba(0,0,0,.16);margin:0 2px}
.dock-item{
  width:46px;height:46px;display:block;position:relative;cursor:pointer;
  transition:transform .22s cubic-bezier(.34,1.56,.64,1);
  border:0;background:none;padding:0;
}
.dock-item:hover{transform:translateY(-10px) scale(1.18)}
.dock-item svg{width:100%;height:100%;display:block}
.dock-item[data-tip]:hover::after{
  content:attr(data-tip);
  position:absolute;bottom:58px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.75);color:#fff;font-size:11px;font-weight:500;
  padding:4px 9px;border-radius:6px;white-space:nowrap;z-index:10;
}
.dock-item.shake{animation:shake .5s}
@keyframes shake{
  20%{transform:rotate(-8deg)}40%{transform:rotate(8deg)}
  60%{transform:rotate(-5deg)}80%{transform:rotate(5deg)}
}

/* ---------------- NOTES / ABOUT WINDOW (bychudy-style) ---------------- */
.win-body.notes-body{padding:0;display:flex;min-height:0}
.notes-side{
  width:118px;flex-shrink:0;padding:12px 10px;
  border-right:1px solid var(--win-line);
}
.notes-side button{
  display:flex;justify-content:space-between;align-items:baseline;width:100%;
  background:none;border:0;font-family:var(--font);font-size:13px;font-weight:600;
  color:rgba(0,0,0,.78);padding:9px 4px;cursor:pointer;
  border-bottom:1px solid rgba(0,0,0,.14);text-align:left;
}
.notes-side button .n{font-size:11.5px;font-weight:500;color:rgba(0,0,0,.4)}
.notes-side button.active{color:#000}
.notes-side button:hover{color:#000}
.notes-content{flex:1;overflow-y:auto;padding:18px 20px 24px;user-select:text}
.notes-content p{font-size:13.5px;line-height:1.6;color:rgba(0,0,0,.8);margin-bottom:14px}
.notes-content h3{font-size:13.5px;font-weight:600;color:rgba(0,0,0,.85);margin:4px 0 12px}
.check{list-style:none;margin:0 0 18px}
.check li{
  display:flex;align-items:center;gap:9px;
  font-size:13px;color:rgba(0,0,0,.8);padding:4.5px 0;
}
.check li::before{
  content:"";width:15px;height:15px;flex-shrink:0;
  background:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><circle cx='8' cy='8' r='8' fill='%23eba13f'/><path d='M4.5 8.3 7 10.7l4.5-5.2' stroke='white' stroke-width='1.8' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>") center/contain no-repeat;
}
/* goals not yet reached: empty ring, waiting for its check */
.check li.todo::before{
  background:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><circle cx='8' cy='8' r='7' fill='none' stroke='%23c9c9c4' stroke-width='1.6'/></svg>") center/contain no-repeat;
}
.check li.todo{color:rgba(0,0,0,.5)}

/* ---------------- DARK ALERT (⚠ in dock) ---------------- */
.alert{
  position:fixed;
  width:min(410px,90vw);z-index:600;
  background:rgba(43,43,45,.94);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  border:1px solid rgba(255,255,255,.09);border-radius:12px;
  box-shadow:0 30px 80px rgba(0,0,0,.55);
  color:#eee;
  animation:alertIn .3s cubic-bezier(.34,1.4,.64,1);
}
@keyframes alertIn{from{opacity:0;transform:scale(.9)}}
.alert.closing{animation:winOut .18s ease forwards}
.alert .abar{
  text-align:center;font-size:12.5px;font-weight:600;color:rgba(255,255,255,.55);
  padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.08);
  cursor:grab;
}
.alert .acontent{display:flex;gap:16px;padding:18px 20px 14px;align-items:flex-start}
.alert .acontent svg{width:46px;height:46px;flex-shrink:0}
.alert .amsg{font-size:13px;line-height:1.55;color:rgba(255,255,255,.88);padding-top:4px}
.alert .aactions{display:flex;justify-content:flex-end;padding:0 20px 16px}
.alert .aactions button{
  background:#2f7cf6;color:#fff;border:0;border-radius:7px;
  padding:7px 16px;font-size:13px;font-weight:500;font-family:var(--font);
  cursor:pointer;transition:background .2s;
}
.alert .aactions button:hover{background:#4a8df8}

/* Pixel-perfect dock icons: drop PNGs into media/logos/
   (ae.png ps.png ai.png warning.png notes.png photos.png
    instagram.png mail.png trash.png) — they auto-replace the
    SVG stand-ins below. Missing file = SVG stays. */
.dock-item{position:relative}
.dock-item img.px{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:contain;z-index:2;pointer-events:none;
}

/* ---------------- MOBILE ----------------
   Same desktop, recomposed for portrait: everything fits one screen,
   icons scattered + throwable, no page scroll. */
@media(max-width:640px){
  body{-webkit-tap-highlight-color:transparent}
  /* wallpaper: portrait crop favors the face (left third of the photo) */
  .wp-sharp,.wp-blur{background-position:32% center}
  /* signature bigger on small screens */
  .signature{width:min(82vw,520px)}
  /* password field: 16px stops iOS from auto-zooming the page */
  .lock input{font-size:16px;width:220px}
  .lock .hint{display:none}
  /* icons: smaller, still absolute + draggable (positions set in JS) */
  .icon{width:76px}
  .icon .thumb{width:54px;height:54px}
  .icon .label{font-size:10px;margin-top:5px}
  /* windows: fill the screen between top edge and dock */
  .app-window{position:fixed;inset:20px 10px 92px;width:auto;max-height:none}
  /* dock: 10 icons fit a phone width */
  .dock{gap:4px;padding:6px 8px;border-radius:16px;bottom:16px;max-width:96vw}
  .dock-item{width:33px;height:33px}
  .dock .sep{display:none}
  .dock-item:hover{transform:none}
  /* notes window: sidebar becomes a tab row on top */
  .win-body.notes-body{flex-direction:column}
  .notes-side{
    width:100%;display:flex;gap:4px;padding:8px 10px;
    border-right:0;border-bottom:1px solid var(--win-line);
  }
  .notes-side button{border-bottom:0;padding:6px 8px;width:auto;flex:1}
  .media-grid{grid-template-columns:1fr}
}
</style>
</head>
<body class="locked">

<!-- lock screen: password gate, macOS login style -->
<div class="lock" id="lock">
  <div class="avatar">TS</div>
  <div class="who">Taimoor Sohail</div>
  <input id="lockInput" type="password" placeholder="Enter Password" autocomplete="off" autofocus>
  <div class="hint">press return</div>
</div>

<!-- Wallpaper: drop media/wallpaper.mp4 (any footage — it gets heavily blurred).
     No file? It silently falls back to media/hero.jpg, then the gradient. -->
<div class="wallpaper">
  <div class="wp-sharp"></div>
  <div class="wp-blur"></div>
  <video autoplay muted loop playsinline
         src="media/wallpaper.mp4"
         onerror="this.remove()"></video>
</div>

<!-- signature: the real signing recording, keyed to ink-only, replayed on boot -->
<video class="signature" src="media/signature.mp4" muted playsinline preload="auto"
       onerror="this.remove()"></video>

<main class="desktop" id="desktop"></main>

  <span class="sep"></span>

  <a class="dock-item" data-tip="Instagram" href="https://www.instagram.com/tsxhail" target="_blank" rel="noopener" aria-label="Instagram">
    <svg viewBox="0 0 48 48">

/* ---------------- Signature draw-on (every boot) ----------------

/* Lock screen: password is "sonder". Unlock starts the boot sequence. */
{
  const lock  = document.getElementById('lock');
  const input = document.getElementById('lockInput');
  input.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (input.value.trim().toLowerCase() === 'sonder'){
      lock.classList.add('open');
      document.body.classList.remove('locked');
      setTimeout(() => lock.remove(), 750);
      startBoot();
    } else {
      input.classList.remove('wrong'); void input.offsetWidth;
      input.classList.add('wrong');
      input.value = '';
    }
  });
}

/* Boot sequence (runs after unlock): signature writes itself →
   lifts away → project icons pop in → dock rises. */
function startBoot(){
  const sig = document.querySelector('.signature');
  const LEAD = 0.6;   /* breath after unlock */
  const HOLD = 0.5;   /* admire it a moment */
  function schedule(duration){
    /* icon/dock animations were paused while locked, so their animation
       clocks are still at ~0 — a plain delay from here works */
    const iconsStart = LEAD + duration + HOLD;
    document.documentElement.style.setProperty('--boot-delay', iconsStart + 's');
    setTimeout(() => sig && sig.classList.add('done'), iconsStart * 1000);
  }
  if (sig){
    if (sig.readyState >= 1) schedule(sig.duration);
    else { sig.addEventListener('loadedmetadata', () => schedule(sig.duration)); }
    sig.addEventListener('error', () => schedule(0));
    setTimeout(() => sig.play().catch(()=>{}), LEAD * 1000);
  } else {
    schedule(0);
  }
}

/* ============================================================
   ICON DRAG PHYSICS — drag freely; release with a flick and it
   glides with momentum + soft bounces off the screen edges.
   A press with < 6px of travel counts as a click → opens window.
   ============================================================ */
function makeIconPhysical(el, project){
  let x, y, vx = 0, vy = 0;
  let dragging = false, moved = false;
  let offX, offY, lastX, lastY, lastT, raf = null;
  const FRICTION = 0.94, BOUNCE = 0.45, STOP = 0.04;

  function bounds(){
    return {
      minX: 4, minY: 10,
      maxX: innerWidth  - el.offsetWidth  - 4,
      maxY: innerHeight - el.offsetHeight - 104   // keep clear of the dock
    };
  }
  function apply(){ el.style.left = x + 'px'; el.style.top = y + 'px'; }

  el.addEventListener('pointerdown', e => {
    e.preventDefault();
    cancelAnimationFrame(raf);
    const r = el.getBoundingClientRect();
    x = r.left; y = r.top; apply();
    offX = e.clientX - r.left; offY = e.clientY - r.top;
    lastX = e.clientX; lastY = e.clientY; lastT = performance.now();
    vx = vy = 0; dragging = true; moved = false;
    el.classList.add('dragging');
    el.setPointerCapture(e.pointerId);
  });

  el.addEventListener('pointermove', e => {
    if (!dragging) return;
    const now = performance.now(), dt = Math.max(now - lastT, 1);
    const nx = e.clientX - offX, ny = e.clientY - offY;
    if (Math.hypot(nx - x, ny - y) > 6) moved = true;
    /* velocity in px/frame (normalized to ~60fps) */
    vx = (e.clientX - lastX) / dt * 16.7;
    vy = (e.clientY - lastY) / dt * 16.7;
    x = nx; y = ny; apply();
    lastX = e.clientX; lastY = e.clientY; lastT = now;
  });

  el.addEventListener('pointerup', () => {
    if (!dragging) return;
    dragging = false;
    el.classList.remove('dragging');
    if (!moved) { openWindow(project, el); return; }
    glide();
  });

  function glide(){
    const b = bounds();
    function step(){
      vx *= FRICTION; vy *= FRICTION;
      x += vx; y += vy;
      if (x < b.minX){ x = b.minX; vx = -vx * BOUNCE; }
      if (x > b.maxX){ x = b.maxX; vx = -vx * BOUNCE; }
      if (y < b.minY){ y = b.minY; vy = -vy * BOUNCE; }
      if (y > b.maxY){ y = b.maxY; vy = -vy * BOUNCE; }
      apply();
      if (Math.hypot(vx, vy) > STOP) raf = requestAnimationFrame(step);
    }
    raf = requestAnimationFrame(step);
  }
}

/* ---------------- Windows ---------------- */
let topZ = 100;
const open = {};

function openWindow(p, anchorEl){
  if (open[p.id]) { bringFront(open[p.id]); return; }

  /* projects with an `html` field (like poems) show that instead of media;
     projects with noPreview skip the preview section entirely */
  const previewHTML = p.noPreview ? ''
    : `<div class="win-sec">Preview:</div>` + (p.html ? p.html
    : `<div class="media-stack">${(p.media && p.media.length)
        ? p.media.map(m => m.type === 'video'
            ? `<video src="${m.src}" controls playsinline preload="metadata" onerror="this.remove()"></video>`
            : `<img src="${m.src}" alt="${p.title} frame" loading="lazy" onerror="this.remove()">`).join('')
        : `<div class="media-note">MP4s + best frames land here. add them to this
           project's <b>media</b> list in index.html.</div>`}</div>`);

  /* details line: custom text, a link, or the type chain */
  const detailHTML = p.detailText ? p.detailText
    : p.link
    ? `<a href="${p.link.url}" target="_blank" rel="noopener" style="text-decoration:underline">${p.link.label}</a>`
    : `Type: ${p.type}`;

  const w = spawnWindow(p.id, p.title, anchorEl, `
    <div class="win-head">
      <div class="mini">${p.thumb ? `<img src="${p.thumb}" alt="">` : ''}</div>
      <div><h2>${p.title}</h2><div class="client">${p.client}, ${p.year}</div></div>
    </div>
    <p>${p.desc}</p>
    <div class="win-sec">Details:</div>
    <div class="detail">${detailHTML}</div>
    ${previewHTML}`);
}

function spawnWindow(id, title, anchorEl, bodyHTML){
  const w = document.createElement('section');
  w.className = 'app-window';
  if (!isMobile()){
    /* open near the clicked icon (like the reference recording),
       clamped so the window stays on screen */
    const winW = Math.min(560, innerWidth * .92);
    let left, top;
    if (anchorEl){
      const r = anchorEl.getBoundingClientRect();
      left = r.right + 18;
      top  = r.top - 20;
      if (left + winW > innerWidth - 12) left = r.left - winW - 18; /* flip to the left side */
      if (left < 12) left = Math.max(12, (innerWidth - winW) / 2);
      top = Math.min(Math.max(40, top), innerHeight * .45);
    } else {
      const n = Object.keys(open).length;
      left = innerWidth  * (.18 + Math.min(n * .04, .22));
      top  = innerHeight * (.12 + Math.min(n * .05, .18));
    }
    w.style.left = left + 'px';
    w.style.top  = top + 'px';
  }
  w.style.zIndex = ++topZ;
  w.innerHTML = `
    <div class="titlebar">
      <span class="lights"><span class="r" title="Close"></span><span class="y"></span><span class="g"></span></span>
      ${title}
    </div>
    <div class="win-body">${bodyHTML}</div>`;
  document.body.appendChild(w);
  open[id] = w;
  w.addEventListener('pointerdown', () => bringFront(w));
  w.querySelector('.lights .r').addEventListener('click', () => {
    w.classList.add('closing');
    w.querySelectorAll('video').forEach(v => v.pause());
    setTimeout(() => { w.remove(); delete open[id]; }, 220);
  });
  makeWindowDraggable(w, w.querySelector('.titlebar'));
  return w;
}

function bringFront(w){ w.style.zIndex = ++topZ; }

function makeWindowDraggable(w, handle){
  if (isMobile()) return;
  let sx, sy, ox, oy, dragging = false;
  handle.addEventListener('pointerdown', e => {
    if (e.target.closest('.lights')) return;
    dragging = true; sx = e.clientX; sy = e.clientY;
    const r = w.getBoundingClientRect(); ox = r.left; oy = r.top;
    handle.setPointerCapture(e.pointerId);
  });
  handle.addEventListener('pointermove', e => {
    if (!dragging) return;
    w.style.left = Math.max(-200, ox + e.clientX - sx) + 'px';
    w.style.top  = Math.max(30,  oy + e.clientY - sy) + 'px';
  });
  handle.addEventListener('pointerup', () => dragging = false);
}

/* dark macOS-style error dialogs. every creative tool has its own tragedy. */
function showAlert(title, msg, btnLabel){
  if (document.querySelector('.alert')) return;
  const a = document.createElement('div');
  a.className = 'alert';
  a.innerHTML = `
    <div class="abar">${title}</div>
    <div class="acontent">
      <svg viewBox="0 0 48 48">
        <path d="M24 6 L45 41 H3 Z" fill="#ffcc00" stroke="#e6a700" stroke-width="1.5" stroke-linejoin="round"/>
        <rect x="22" y="18" width="4" height="12" rx="2" fill="#1d1d1f"/>
        <circle cx="24" cy="35" r="2.4" fill="#1d1d1f"/>
      </svg>
      <div class="amsg">${msg}</div>
    </div>
    <div class="aactions"><button>${btnLabel}</button></div>`;
  document.body.appendChild(a);
  /* center it, then hand it px coordinates so it drags like any window */
  const r = a.getBoundingClientRect();
  a.style.left = Math.round((innerWidth  - r.width)  / 2) + 'px';
  a.style.top  = Math.round(innerHeight * .36 - r.height / 2) + 'px';
  a.style.zIndex = topZ = Math.max(topZ + 1, 601);
  a.addEventListener('pointerdown', () => a.style.zIndex = ++topZ);
  makeWindowDraggable(a, a.querySelector('.abar'));
  a.querySelector('button').addEventListener('click', () => {
    a.classList.add('closing');
    setTimeout(() => a.remove(), 180);
  });
}

/* Auto-upgrade dock icons to pixel-perfect PNGs when present in media/logos/ */
[['After Effects','ae'],['Premiere Pro','pr'],['Photoshop','ps'],['Illustrator','ai'],['Work in progress','warning'],
 ['About me','notes'],['Frames','photos'],['Instagram','instagram'],['Email me','mail'],['Trash','trash']]
.forEach(([tip, file]) => {
  const item = document.querySelector(`.dock-item[data-tip="${tip}"]`);
  if (!item) return;
  /* svg preferred, png fallback: first one that loads wins */
  const img = new Image();
  img.className = 'px';
  img.onload = () => item.appendChild(img);
  img.onerror = () => {
    const png = new Image();
    png.className = 'px';
    png.onload = () => item.appendChild(png);
    png.src = `media/logos/${file}.png`;
  };
  img.src = `media/logos/${file}.svg`;
});
